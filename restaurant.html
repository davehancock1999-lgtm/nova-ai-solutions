<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width", initial-scale="1.0">
        <title>The Tavern | Luxury Dining</title>

        <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">

        <style>
            .nav-back {
                position: absolute;
                top: 20px;
                left: 20px;
                color: #ffffff;
                text-decoration: none;
                font-weight: bold;
            }


            body, html {
                margin: 0;
                padding: 0;
                height: 100%;
                font-family: 'Arial', sans-serif;
                background-color: #000;
            }

            .tavern-hero {
                height: 100vh;
                background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.7)),
                            url('https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?q=80&w=2000&auto=format&fit=crop');
                background-size: cover;
                background-position: center;
                background-color: #1a1a1a;
                display: flex;
                align-items: center;
                justify-content: center;
                color: #f4f1ea;
                text-align: center;             
            }
            .glass-container {
                background: rgba(0, 0, 0, 0.4);
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                padding: 60px 40px;
                border: 1px solid rgba(255, 255, 255, 0.1);
                max-width: 80%
            }

            .brand-name {
                font-family: 'Playfair Display', serif;
                font-size: clamp(3rem, 8vw, 5.5rem);
                font-weight: 400;
                letter-spacing: 15px;
                text-transform: uppercase;
                margin: 0;
            }

            .divider {
                width: 80px;
                height: 2px;
                background: #d4af37;
                margin: 25px auto;
            }

            .tagline {
                letter-spacing: 5px;
                font-size: 0.9rem;
                margin-bottom: 40px;
                text-transform: uppercase;
            }

            .cta-button {
                display: inline-block;
                padding: 15px 45px;
                border: 1px solid #d4af37;
                color: #d4af37;
                text-decoration: none;
                letter-spacing: 3px;
                font-size: 0.8rem;
                transition: all 0.4s ease;
            }

            .cta-button:hover {
                background: #d4af37;
                color: #000;
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <a href="index.html" class="nav-back">← HOME</a>

        <header class="tavern-hero">
            <div class="glass-container">
                <h1 class="brand-name">The Tavern</h1>
                <div class="divider"></div>
                <p class="tagline">Exquisite Dining ⚫️ Timeless Elegance</p>
                <a href="#" class="cta-buttom">Reserve A Table</a>
            </div>
        </header>
    </body>
</html>
